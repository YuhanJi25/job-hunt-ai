/* ---------- Logging Helpers ---------- */
function addLog(message, type='info') {
    showSection('logsSection');
    const timestamp = new Date().toLocaleTimeString();
    const logsContent = document.getElementById('logsContent');
    const logDiv = document.createElement('div');
    logDiv.className = `log-entry log-${type}`;
    logDiv.style.marginBottom='6px';
    logDiv.style.paddingLeft='8px';
    logDiv.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
    logsContent.appendChild(logDiv);
    logsContent.scrollTop = logsContent.scrollHeight;
}
function showSection(id) { document.getElementById(id).style.display = 'block'; }
function hideSection(id) { document.getElementById(id).style.display = 'none'; }
function showError(msg){ const el = document.getElementById('errorMessage'); el.innerHTML = msg; el.style.display='block'; }
function clearError(){ document.getElementById('errorMessage').style.display='none'; }
function showSuccess(msg){ const el = document.getElementById('successMessage'); el.innerHTML = msg; el.style.display='block'; }
function clearSuccess(){ document.getElementById('successMessage').style.display='none'; }

/* ---------- Load system prompt (optional file) ---------- */
async function loadSystemPrompt() {
    try {
        addLog('Loading system prompt...', 'info');
        const r = await fetch('Resume_opt_prompt.txt');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        systemPrompt = await r.text();
        addLog('System prompt loaded from Resume_opt_prompt.txt', 'success');
    } catch (e) {
        addLog(`Could not fetch Resume_opt_prompt.txt: ${e.message}`, 'warning');
        systemPrompt = getEmbeddedPrompt();
        addLog('Using embedded fallback prompt', 'info');
    }
}
function getEmbeddedPrompt(){
    return `You are an intelligent Resume Optimization Agent. Return a JSON object with fields: name, contact, summary, education[], experience[], skills[], projects[], additional[]. DO NOT output any explanation. Only return valid JSON.`;
}
window.addEventListener('DOMContentLoaded', loadSystemPrompt);

/* ---------- File handling & extraction ---------- */
document.getElementById('resumeFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        uploadedFile = file;
        document.getElementById('fileInfo').innerHTML =
            `<i class="fas fa-check-circle" style="color:#28a745;"></i> Selected: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
    }
});

async function extractTextFromResume(file){
    const name = file.name.toLowerCase();
    if (name.endsWith('.pdf')) {
        const arrayBuffer = await file.arrayBuffer();
        const typed = new Uint8Array(arrayBuffer);
        const pdf = await pdfjsLib.getDocument(typed).promise;
        let fullText = '';
        for (let p=1; p<=pdf.numPages; p++){
            const page = await pdf.getPage(p);
            const tc = await page.getTextContent();
            const pageText = tc.items.map(it => it.str).join(' ');
            fullText += pageText + '\n\n';
        }
        return { fullText, sections: parseResumeSections(fullText) };
    } else {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const txt = String(reader.result);
                resolve({ fullText: txt, sections: parseResumeSections(txt) });
            };
            reader.onerror = (err) => reject(err);
            reader.readAsText(file);
        });
    }
}

/* ---------- Simple section parser (lightweight) ---------- */
function parseResumeSections(text){
    const sections = { header:'', summary:'', education:'', experience:'', skills:'', projects:'', other:'' };
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    let current = 'header';
    const patterns = {
        summary: /\b(summary|objective|profile|about)\b/i,
        education: /\b(education|academic|qualification)\b/i,
        experience: /\b(experience|employment|work history)\b/i,
        skills: /\b(skills|technical skills|competencies|technologies)\b/i,
        projects: /\b(projects|portfolio)\b/i
    };
    let headerLines=[];
    for (const line of lines){
        let matched = false;
        for (const [k,pat] of Object.entries(patterns)){
            if (pat.test(line)) { current=k; matched=true; addLog(`Found section ${k}`, 'info'); break; }
        }
        if (!matched) {
            if (current==='header' && headerLines.length<5) headerLines.push(line);
            else sections[current] += line + '\n';
        }
    }
    sections.header = headerLines.join(' | ');
    return sections;
}

/* ---------- Test prompt display ---------- */
function testSystemPrompt(){

    addLog('--- System Prompt (truncated) ---', 'info');
    const preview = systemPrompt.slice(0, 2000) + (systemPrompt.length>2000 ? '\n\n...(truncated)' : '');
    addLog(preview.replace(/\n/g, ' '), 'info');
    navigator.clipboard?.writeText(systemPrompt).then(()=> addLog('System prompt copied to clipboard', 'success')).catch(()=>addLog('Clipboard copy failed', 'warning'));
}

/* ---------- Escape text for LaTeX safety ---------- */
function escapeLatexForTemplate(s) {
    if (s === null || s === undefined) return '';
    s = String(s);
    const replacements = {
        '\\': '\\textbackslash{}',
        '&': '\\&',
        '%': '\\%',
        '$': '\\$',
        '#': '\\#',
        '_': '\\_',
        '{': '\\{',
        '}': '\\}',
        '~': '\\textasciitilde{}',
        '^': '\\textasciicircum{}'
    };
    return s.replace(/([\\&%$#_{}~^])/g, (m) => replacements[m] || m);
}

/* ---------- Build LaTeX from JSON data ---------- */
function buildLatexFromJson(json) {
    // Name and contact
    const name = escapeLatexForTemplate(json.name || '');
    const contact = json.contact || {};
    const contactParts = [];
    
    if (contact.location) contactParts.push(escapeLatexForTemplate(contact.location));
    if (contact.phone) contactParts.push(escapeLatexForTemplate(contact.phone));
    if (contact.email) contactParts.push(`\\href{mailto:${escapeLatexForTemplate(contact.email)}}{\\underline{${escapeLatexForTemplate(contact.email)}}}`);
    if (contact.linkedin) contactParts.push(`\\href{${escapeLatexForTemplate(contact.linkedin)}}{\\underline{LinkedIn}}`);
    if (contact.github) contactParts.push(`\\href{${escapeLatexForTemplate(contact.github)}}{\\underline{Github}}`);
    
    const contactLine = contactParts.join(' ~ $\\mid$ ~ ');
    
    // Summary
    const summary = escapeLatexForTemplate(json.summary || '');
    
    // Education
    let educationItems = '';
    if (Array.isArray(json.education)) {
        for (const e of json.education) {
            const degree = escapeLatexForTemplate(e.degree || '');
            const dates = escapeLatexForTemplate(e.dates || '');
            const inst = escapeLatexForTemplate(e.institution || '');
            const gpa = escapeLatexForTemplate(e.gpa || '');
            educationItems += `\\resumeSubheading{${degree}}{${dates}}{${inst}}{${gpa}}\n`;
        }
    }
    
    // Experience
    let experienceItems = '';
    if (Array.isArray(json.experience)) {
        for (const job of json.experience) {
            const title = escapeLatexForTemplate(job.title || '');
            const dates = escapeLatexForTemplate(job.dates || '');
            const company = escapeLatexForTemplate(job.company || '');
            const location = escapeLatexForTemplate(job.location || '');
            experienceItems += `\\resumeSubheading{${title}}{${dates}}{${company}}{${location}}\n\\resumeItemListStart\n`;
            
            if (Array.isArray(job.bullets)) {
                for (const b of job.bullets) {
                    experienceItems += `\\resumeItem{${escapeLatexForTemplate(b)}}\n`;
                }
            }
            experienceItems += `\\resumeItemListEnd\n`;
        }
    }
    
    // Skills - Categorized format
    let skillsItems = '';
    if (json.skills) {
        if (Array.isArray(json.skills)) {
            // Handle array format
            skillsItems = `\\begin{itemize}[leftmargin=0.15in, label={}]

  \\small{\\item{
    \\textbf{Skills}{: ${json.skills.map(s => escapeLatexForTemplate(s)).join(', ')}}
  }}
\\end{itemize}`;
        } else {
            // Handle object format with categories
            const categories = [];
            if (json.skills.languages && json.skills.languages.length) {
                categories.push(`\\textbf{Languages}{: ${json.skills.languages.map(s => escapeLatexForTemplate(s)).join(', ')}}`);
            }
            if (json.skills.frameworks && json.skills.frameworks.length) {
                categories.push(`\\textbf{Frameworks}{: ${json.skills.frameworks.map(s => escapeLatexForTemplate(s)).join(', ')}}`);
            }
            if (json.skills.tools && json.skills.tools.length) {
                categories.push(`\\textbf{Developer Tools}{: ${json.skills.tools.map(s => escapeLatexForTemplate(s)).join(', ')}}`);
            }
            if (json.skills.databases && json.skills.databases.length) {
                categories.push(`\\textbf{Databases}{: ${json.skills.databases.map(s => escapeLatexForTemplate(s)).join(', ')}}`);
            }
            
            // Add any other categories
            for (const [key, value] of Object.entries(json.skills)) {
                if (!['languages', 'frameworks', 'tools', 'databases'].includes(key) && Array.isArray(value) && value.length) {
                    const categoryName = key.charAt(0).toUpperCase() + key.slice(1);
                    categories.push(`\\textbf{${categoryName}}{: ${value.map(s => escapeLatexForTemplate(s)).join(', ')}}`);
                }
            }
            
            skillsItems = `\\begin{itemize}[leftmargin=0.15in, label={}]

  \\small{\\item{
    ${categories.join(' \\\\\n    ')}
  }}
\\end{itemize}`;
        }
    }
    
    // Projects

/* ---------- Remote AI call using DeepInfra ---------- */
async function optimizeWithAI_remote_json(promptData) {
    const apiKey = DEEPINFRA_API_KEY;
    if (!apiKey) throw new Error('DeepInfra API key not set');
    
    // Extract key requirements from job description for better targeting
    const jobDesc = promptData.jobDescription || '';
    
    // Construct a more effective user message that focuses on optimization
    const userMessage = `
# Resume Optimization Request

## Candidate Information
- Level: ${promptData.candidateLevel}
- Current Info: ${JSON.stringify(promptData.contactInfo)}

## Job Description
${jobDesc}

## Resume Content
${promptData.resumeChunks.join('\n')}

## Instructions
1. ANALYZE the resume to understand the candidate's background and experience
2. OPTIMIZE the content following the format rules for a ${promptData.candidateLevel} candidate:
   - Rewrite bullets in "action → impact → tools" format 
   - Quantify achievements
   - Prioritize relevant experience for the job description
   - Categorize skills properly into Languages, Frameworks, etc.
3. RESPOND with ONLY a valid JSON object that follows this structure:

{
  "name": "Full Name",
  "contact": {
    "phone": "Phone Number",
    "email": "Email",
    "linkedin": "LinkedIn URL",
    "github": "GitHub URL",
    "location": "Location"
  },
  "summary": "A concise, impactful professional summary",
  "education": [
    {
      "institution": "University Name",
      "location": "Location",
      "degree": "Degree Name",
      "dates": "Date Range",
      "gpa": "GPA if available"
    }
  ],
  "experience": [
    {
      "title": "Job Title",
      "company": "Company Name",
      "location": "Location",
      "dates": "Date Range",
      "bullets": [
        "Accomplishment using X-Y-Z format: Did X to achieve Y using Z",
        "Another quantifiable achievement"
      ]
    }
  ],
  "skills": {
    "languages": ["Language1", "Language2"],
    "frameworks": ["Framework1", "Framework2"],
    "tools": ["Tool1", "Tool2"],
    "databases": ["Database1", "Database2"]
  },
  "projects": [
    {
      "title": "Project Name",
      "date": "Date",
      "bullets": ["Detail in X-Y-Z format", "Another detail"]
    }
  ],
  "additional": ["Additional info 1", "Additional info 2"]
}`;

    // Use a more capable model for structure
    const modelToUse = 'mistralai/Mixtral-8x7B-Instruct-v0.1';
    
    const response = await fetch('https://api.deepinfra.com/v1/openai/chat/completions', {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            model: modelToUse,
            messages: [
                { 
                    role: 'system', 
                    content: promptData.systemPrompt 
                },
                { role: 'user', content: userMessage }
            ],
            max_tokens: 4000,
            temperature: 0.3
        })
    });

    if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`DeepInfra API error: ${response.status} - ${errorText}`);
    }

    const data = await response.json();
    let content = data.choices[0].message.content.trim();
    addLog(`Raw AI response length: ${content.length} chars`, 'info');
    
    // Extract JSON using regex
    const jsonMatch = content.match(/```(?:json)?\s*([\s\S]*?)```|(\{[\s\S]*\})/);
    let jsonContent = jsonMatch ? (jsonMatch[1] || jsonMatch[2]) : content;
    
    // Clean up JSON
    jsonContent = jsonContent.trim();
    if (!jsonContent.startsWith('{')) {
        jsonContent = '{' + jsonContent.substring(jsonContent.indexOf('{') + 1);
    }
    if (!jsonContent.endsWith('}')) {
        jsonContent = jsonContent.substring(0, jsonContent.lastIndexOf('}') + 1);
    }
    
    // Validate by parsing
    try {
        JSON.parse(jsonContent);
        addLog('JSON validation successful', 'success');
    } catch (e) {
        addLog(`JSON validation failed: ${e.message}. Attempting repair...`, 'error');
        
        // Basic cleanup - remove trailing commas before closing brackets
        jsonContent = jsonContent.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
        
        try {
            JSON.parse(jsonContent);
            addLog('JSON repair successful', 'success');
        } catch (finalError) {
            addLog(`Final JSON validation failed: ${finalError.message}`, 'error');
            throw new Error('Unable to parse AI response as valid JSON');
        }
    }
    
    return jsonContent;
}

/* ---------- Main optimizeResume (uses JSON-first approach) ---------- */
async function optimizeResume() {
    clearError(); clearSuccess();
    if (!uploadedFile) { showError('Please upload a resume file first.'); return; }
    const jobDesc = document.getElementById('jobDescription').value.trim();
    if (!jobDesc) { showError('Please enter a job description.'); return; }

    showSection('logsSection'); 
    hideSection('previewSection');
    showSection('loading'); 
    document.getElementById('logsContent').innerHTML='';

    try {
        addLog('Starting pipeline: extract -> ask LLM for JSON -> populate LaTeX template', 'info');

        // Extract
        addLog('Extracting text...', 'info');
        const resumeData = await extractTextFromResume(uploadedFile);
        addLog(`Extracted ${resumeData.fullText.length} chars`, 'success');

        // Candidate level
        addLog('Analyzing candidate level...', 'info');
        const candidateLevel = await analyzeCandidateLevel(resumeData);
        addLog(`Candidate level: ${candidateLevel}`, 'success');

        // Prepare prompt/payload for LLM
        const promptData = {
            systemPrompt,
            candidateLevel,
            contactInfo: { name: resumeData.sections.header },
            jobDescription: jobDesc,
            resumeChunks: [resumeData.fullText]
        };

        // Call remote AI API
        addLog('Requesting optimized JSON from AI (remote)...', 'info');
        const jsonString = await optimizeWithAI_remote_json(promptData);
        addLog('AI returned JSON string (attempting to parse)...', 'info');

        // Try parse
        let parsed;
        try {
            parsed = JSON.parse(jsonString);
            addLog('Parsed AI JSON successfully', 'success');
        } catch (err) {
            addLog('Failed to parse JSON from AI. Showing raw output in logs for debugging.', 'error');
            addLog(jsonString, 'error');
            throw new Error('AI did not return valid JSON. Inspect logs.');
        }

        // Build LaTeX
        addLog('Populating LaTeX template with JSON data...', 'info');
        const latex = buildLatexFromJson(parsed);
        addLog(`LaTeX built (${latex.length} chars)`, 'success');

        // Validate minimal LaTeX boundaries
        if (!latex.includes('\\documentclass') || !latex.includes('\\end{document}')) {
            addLog('LaTeX appears incomplete; aborting.', 'error');
            throw new Error('Generated LaTeX invalid or incomplete.');
        }

        // QA checks (skip PDF validation)
        const qa = await postCheckQA(latex, null);
        addLog(`QA: ATS score ${qa.atsScore}%`, qa.atsScore >= 90 ? 'success' : 'warning');

        // Display results - directly show LaTeX code
        await displayResults(latex, qa);

    } catch (err) {
        addLog(`Error: ${err.message}`, 'error');
        showError('Optimization failed: ' + err.message);
    } finally {
        hideSection('loading');
    }
}
/* ---------- Candidate level analyzer (reused) ---------- */
async function analyzeCandidateLevel(resumeData) {
    addLog('Analyzing candidate experience level...', 'info');
    const text = (resumeData.fullText || '').toLowerCase();
    const yearsMatch = text.match(/(\\d+)\\+?\\s*years?\\s*(of)?\\s*experience/i);
    let level = 'Mid-Level';
    if (yearsMatch) {
        const years = parseInt(yearsMatch[1]);
        level = years >=5 ? 'Expert / Senior' : years >=2 ? 'Mid-Level' : 'Early Career / Beginner';
    } else if (text.includes('senior') || text.includes('lead')) {
        level = 'Expert / Senior';
    } else if (text.includes('intern') || text.includes('student')) {
        level = 'Early Career / Beginner';
    }
    addLog(`Candidate level: ${level}`, 'success');
    return level;
}

/* ---------- QA checks (basic) ---------- */
async function postCheckQA(latex, pdfBlob) {
    const qa = { textSelectable: false, atsScore: 75, keywordMatch: [], validation: [] };
    if (pdfBlob && pdfBlob.type === 'application/pdf') qa.textSelectable = true;
    
    const lower = latex.toLowerCase();
    
    // Check for important resume sections
    ['experience', 'education', 'skills'].forEach(k => { 
        if (lower.includes(k)) qa.keywordMatch.push(k); 
    });
    
    // Check for tech keywords based on skills commonly found in resumes
    ['python', 'javascript', 'java', 'c++', 'aws', 'docker', 'kubernetes', 'react', 
     'machine learning', 'data science', 'devops', 'cloud', 'sql'].forEach(k => {
        if (lower.includes(k.toLowerCase())) qa.keywordMatch.push(k);
    });
    
    // Calculate ATS score based on structure and keywords
    qa.atsScore = Math.min(95, 70 + qa.keywordMatch.length * 2);
    
    // Validate LaTeX structure
    qa.validation.push({ check: 'LaTeX structure', passed: latex.includes('\\documentclass') });
    qa.validation.push({ check: 'Sections present', passed: (latex.match(/\\section\{/g) || []).length >= 3 });
    qa.validation.push({ check: 'Skills categorized', passed: lower.includes('languages') && lower.includes('frameworks') });
    qa.validation.push({ check: 'Bullet points', passed: latex.includes('\\resumeItem') });
    
    return qa;
}

/* ---------- Display results ---------- */
async function displayResults(latex, qaResults) {
    // Create a textarea element to display the LaTeX code
    const previewSection = document.getElementById('previewSection');
    previewSection.innerHTML = `
        <h3><i class="fas fa-file-code"></i> LaTeX Output</h3>
        <div id="compilationInfo" style="background:#fff3cd;border:1px solid #ffc107;padding:10px;border-radius:5px;margin-bottom:12px;">
            <strong><i class="fas fa-info-circle"></i> Status:</strong> <span id="compilationMessage"></span>
        </div>
        <pre id="latexOutput" style="background:#f8f9fa; padding:15px; border:1px solid #dee2e6; border-radius:5px; font-family:'Courier New', monospace; font-size:12px; overflow-x:auto; white-space:pre-wrap; max-height:500px; overflow-y:auto;"></pre>
        <div style="margin-top:12px; text-align:center;">
            <button id="copyLatexBtn" class="download-button" onclick="copyLatexToClipboard()"><i class="fas fa-copy"></i> Copy LaTeX</button>
        </div>
    `;
    
    // Set the LaTeX code to the pre element
    document.getElementById('latexOutput').textContent = latex;

    showSection('previewSection');
    showSection('logsSection');
    
    // Update compilation info display
    const compMsg = document.getElementById('compilationMessage');
    const comp = document.getElementById('compilationInfo');
    comp.style.background = qaResults && qaResults.atsScore >= 90 ? '#d4edda' : '#fff3cd';
    comp.style.borderColor = qaResults && qaResults.atsScore >= 90 ? '#28a745' : '#ffc107';
    compMsg.innerHTML = `ATS Score: ${qaResults ? qaResults.atsScore : 'N/A'}% | Keywords: ${qaResults ? qaResults.keywordMatch.length : 0}`;
    
    showSuccess('LaTeX code generated successfully.');
}

/* ---------- Copy LaTeX to clipboard ---------- */
function copyLatexToClipboard() {
    const latex = document.getElementById('latexOutput').textContent;
    navigator.clipboard.writeText(latex).then(() => {
        addLog('LaTeX copied to clipboard', 'success');
        showSuccess('LaTeX code copied to clipboard!');
    }).catch(() => {
        addLog('Failed to copy LaTeX', 'error');
        showError('Failed to copy LaTeX code.');
    });
}
